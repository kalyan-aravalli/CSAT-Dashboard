<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CSAT Survey Dashboard – AR Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "FIREBASE_API_KEY",
    authDomain: "FIREBASE_AUTH_DOMAIN",
    projectId: "FIREBASE_PROJECT_ID",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let intData = [], extData = [], questions = [], openKey = "";
  let sentiments = [], chartInstances = {};

  const SCORE_COLORS = ["#E24B4A","#EF9F27","#888780","#1D9E75","#0F6E56"];

  function csat(data) {
    if (!data.length || !questions[0]) return 0;
    return Math.round(data.filter(r => Number(r[questions[0].key]) >= 4).length / data.length * 100);
  }
  function avg(data, key) {
    const vals = data.map(r=>Number(r[key])).filter(v=>!isNaN(v)&&v>0);
    if (!vals.length) return "—";
    return (vals.reduce((s,v)=>s+v,0)/vals.length).toFixed(1);
  }
  function dist(data, key) {
    return [1,2,3,4,5].map(s=>data.filter(r=>Number(r[key])===s).length);
  }
  function destroyChart(id) {
    if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
  }
  function makeChart(id, data) {
    destroyChart(id);
    const el = document.getElementById(id);
    if (!el) return;
    chartInstances[id] = new Chart(el, {
      type:"bar",
      data:{ labels:["1","2","3","4","5"], datasets:[{data, backgroundColor:SCORE_COLORS, borderRadius:3}] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ticks:{font:{size:9}},grid:{display:false}}, y:{ticks:{font:{size:9},stepSize:1}} } }
    });
  }

  function updateMetrics() {
    const all = [...intData,...extData];
    document.getElementById("total-count").textContent = all.length;
    document.getElementById("m-overall").textContent = csat(all)+"%";
    document.getElementById("m-overall-sub").textContent = all.length+" total responses";
    document.getElementById("m-int").textContent = csat(intData)+"%";
    document.getElementById("m-int-sub").textContent = intData.length+" responses";
    document.getElementById("m-ext").textContent = csat(extData)+"%";
    document.getElementById("m-ext-sub").textContent = extData.length+" responses";
    document.getElementById("m-split").textContent = intData.length+" / "+extData.length;
    document.getElementById("loading").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  }

  function renderOverview() {
    const all = [...intData,...extData];
    const grid = document.getElementById("overview-grid");
    grid.innerHTML = "";
    questions.slice(0,4).forEach((q,i) => {
      const d = dist(all, q.key);
      const a = avg(all, q.key);
      const card = document.createElement("div");
      card.className = "q-card";
      card.innerHTML = `<div class="qlabel">${q.key}</div><div class="qlabel" style="font-weight:500;color:var(--text);margin-bottom:6px">${q.label}</div><div class="qavg">${a}<span> / 5</span></div><div class="chart-wrap"><canvas id="oc${i}"></canvas></div>`;
      grid.appendChild(card);
      setTimeout(()=>makeChart("oc"+i,d),0);
    });
  }

  function renderQuestions() {
    const all = [...intData,...extData];
    const container = document.getElementById("questions-deep");
    container.innerHTML = "";
    questions.forEach((q,i) => {
      const di = dist(intData,q.key), de = dist(extData,q.key);
      const card = document.createElement("div");
      card.className = "qdeep-card";
      card.innerHTML = `<div class="qdeep-title">[${q.key}] ${q.label}</div><div class="qdeep-avgs"><span style="color:var(--blue)">Internal: ${avg(intData,q.key)}</span><span style="color:var(--amber)">External: ${avg(extData,q.key)}</span><span style="color:var(--muted)">Overall: ${avg(all,q.key)}</span></div><div class="qdeep-charts"><div><div class="qsub-label" style="color:var(--blue)">Internal</div><div class="chart-wrap"><canvas id="qi${i}a"></canvas></div></div><div><div class="qsub-label" style="color:var(--amber)">External</div><div class="chart-wrap"><canvas id="qi${i}b"></canvas></div></div></div>`;
      container.appendChild(card);
      setTimeout(()=>{ makeChart("qi"+i+"a",di); makeChart("qi"+i+"b",de); },0);
    });
  }

  function renderFeedback() {
    const all = [...intData,...extData];
    const list = document.getElementById("feedback-list");
    list.innerHTML = "";
    const counts = {positive:0,neutral:0,negative:0};
    sentiments.forEach(s=>{ if(counts[s.sentiment]!==undefined) counts[s.sentiment]++; });
    document.getElementById("sp-pos").textContent = counts.positive+" positive";
    document.getElementById("sp-neu").textContent = counts.neutral+" neutral";
    document.getElementById("sp-neg").textContent = counts.negative+" negative";
    all.forEach((row,i) => {
      const txt = String(row[openKey]||"");
      if (!txt||txt.length<3) return;
      const isInt = i<intData.length;
      const s = sentiments.find(x=>x.id===i);
      const sColor = s?.sentiment==="positive"?"var(--teal-dark)":s?.sentiment==="negative"?"var(--red)":"var(--gray)";
      const sBg = s?.sentiment==="positive"?"var(--teal-light)":s?.sentiment==="negative"?"var(--red-light)":"var(--gray-light)";
      const item = document.createElement("div");
      item.className = "feedback-item";
      item.innerHTML = `<span class="badge" style="background:${isInt?"var(--blue-light)":"var(--amber-light)"};color:${isInt?"var(--blue)":"var(--amber)"}">${isInt?"Internal":"External"}</span><p class="fbtext">${txt}</p>${s?`<span class="sent-badge" style="background:${sBg};color:${sColor}">${s.sentiment}</span>`:""}`;
      list.appendChild(item);
    });
  }

  function refresh() {
    updateMetrics();
    const active = document.querySelector(".tab.active")?.dataset?.tab;
    if (active==="overview") renderOverview();
    else if (active==="questions") renderQuestions();
    else if (active==="feedback") renderFeedback();
  }

  onSnapshot(doc(db,"survey","data"), snap => {
    if (!snap.exists()) return;
    const d = snap.data();
    intData = d.internal || [];
    extData = d.external || [];
    questions = d.questions || [];
    openKey = d.openKey || "";
    sentiments = d.sentiments || [];
    refresh();
  });

  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("panel-"+btn.dataset.tab).classList.add("active");
      if (btn.dataset.tab==="overview") renderOverview();
      else if (btn.dataset.tab==="questions") renderQuestions();
      else if (btn.dataset.tab==="feedback") renderFeedback();
    });
  });
</script>
<style>
  :root { --teal:#1D9E75;--teal-light:#E1F5EE;--teal-dark:#0F6E56;--blue:#185FA5;--blue-light:#E6F1FB;--amber:#BA7517;--amber-light:#FAEEDA;--red:#E24B4A;--red-light:#FCEBEB;--gray:#888780;--gray-light:#F1EFE8;--surface:#f9f9f8;--card:#ffffff;--border:rgba(0,0,0,0.1);--text:#1a1a18;--muted:#6b6b68;--hint:#9e9e9b;--radius:10px; }
  @media (prefers-color-scheme:dark){ :root{ --surface:#1c1c1a;--card:#262624;--border:rgba(255,255,255,0.1);--text:#f0f0ed;--muted:#a0a09c;--hint:#6b6b68;--teal-light:#04342C;--blue-light:#042C53;--amber-light:#412402;--red-light:#501313;--gray-light:#2C2C2A; } }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:var(--surface);color:var(--text);padding:24px 20px;max-width:900px;margin:0 auto}
  #loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
  #dashboard{display:none}
  .eyebrow{font-size:11px;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  h1{font-size:20px;font-weight:500;margin-bottom:2px}
  .subtitle{font-size:12px;color:var(--muted);margin-bottom:20px}
  .metric-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  .metric-card{flex:1;min-width:120px;background:var(--card);border-radius:var(--radius);padding:12px 14px;border:.5px solid var(--border)}
  .metric-card .mlabel{font-size:11px;color:var(--muted);margin-bottom:4px}
  .metric-card .mvalue{font-size:26px;font-weight:500;margin-bottom:2px}
  .metric-card .msub{font-size:11px;color:var(--hint)}
  .tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:16px}
  .tab{font-size:12px;padding:7px 14px;border:none;background:transparent;cursor:pointer;color:var(--muted);font-family:inherit;border-bottom:2px solid transparent;text-transform:capitalize}
  .tab.active{color:var(--text);border-bottom:2px solid var(--text)}
  .panel{display:none}.panel.active{display:block}
  .q-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .q-card{background:var(--card);border-radius:var(--radius);padding:12px;border:.5px solid var(--border)}
  .qlabel{font-size:11px;color:var(--muted);margin-bottom:2px}
  .qavg{font-size:20px;font-weight:500;margin-bottom:8px;color:var(--teal)}
  .qavg span{font-size:11px;font-weight:400;color:var(--hint)}
  .chart-wrap{position:relative;height:90px}
  .sent-pills{display:flex;gap:8px;margin-bottom:12px}
  .sent-pill{padding:6px 12px;border-radius:var(--radius);font-size:11px;font-weight:500}
  .feedback-list{display:flex;flex-direction:column;gap:6px}
  .feedback-item{background:var(--card);border-radius:var(--radius);border:.5px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:flex-start}
  .badge{font-size:10px;padding:2px 8px;border-radius:20px;white-space:nowrap;margin-top:2px}
  .fbtext{font-size:12px;line-height:1.6;flex:1;color:var(--text)}
  .sent-badge{font-size:10px;padding:2px 8px;border-radius:20px;white-space:nowrap;margin-top:2px}
  .questions-deep{display:flex;flex-direction:column;gap:14px}
  .qdeep-card{background:var(--card);border-radius:var(--radius);padding:14px;border:.5px solid var(--border)}
  .qdeep-title{font-size:13px;font-weight:500;margin-bottom:8px}
  .qdeep-avgs{display:flex;gap:16px;margin-bottom:8px;font-size:11px}
  .qdeep-charts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .qsub-label{font-size:11px;color:var(--muted);margin-bottom:4px}
  .footer-note{font-size:10px;color:var(--hint);text-align:center;margin-top:20px}
  @media(max-width:500px){.q-grid,.qdeep-charts{grid-template-columns:1fr}.metric-row{flex-direction:column}}
</style>
</head>
<body>
<div id="loading">Loading survey data…</div>
<div id="dashboard">
  <p class="eyebrow">AR Platform · April 2025</p>
  <h1>CSAT Survey Dashboard</h1>
  <p class="subtitle"><span id="total-count">0</span> responses · Live view</p>
  <div class="metric-row">
    <div class="metric-card"><div class="mlabel">Overall CSAT</div><div class="mvalue" id="m-overall" style="color:var(--teal)">—</div><div class="msub" id="m-overall-sub"></div></div>
    <div class="metric-card"><div class="mlabel">Internal CSAT</div><div class="mvalue" id="m-int" style="color:var(--blue)">—</div><div class="msub" id="m-int-sub"></div></div>
    <div class="metric-card"><div class="mlabel">External CSAT</div><div class="mvalue" id="m-ext" style="color:var(--amber)">—</div><div class="msub" id="m-ext-sub"></div></div>
    <div class="metric-card"><div class="mlabel">Response split</div><div class="mvalue" id="m-split" style="color:var(--text);font-size:20px">—</div><div class="msub">Internal / External</div></div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="questions">By question</button>
    <button class="tab" data-tab="feedback">Feedback</button>
  </div>
  <div class="panel active" id="panel-overview"><div class="q-grid" id="overview-grid"></div></div>
  <div class="panel" id="panel-questions"><div class="questions-deep" id="questions-deep"></div></div>
  <div class="panel" id="panel-feedback">
    <div class="sent-pills">
      <div class="sent-pill" id="sp-pos" style="background:var(--teal-light);color:var(--teal-dark)">0 positive</div>
      <div class="sent-pill" id="sp-neu" style="background:var(--gray-light);color:var(--gray)">0 neutral</div>
      <div class="sent-pill" id="sp-neg" style="background:var(--red-light);color:var(--red)">0 negative</div>
    </div>
    <div class="feedback-list" id="feedback-list"></div>
  </div>
  <p class="footer-note">CSAT = % of responses scoring 4 or 5 · Updates live when admin uploads new data</p>
</div>
</body>
</html>
